# The spring.application.name property is used to specify the name of the Spring Boot application.
# It can be used for various purposes, such as logging, monitoring, and service discovery.
# In this case, the application is named "journalApp".
spring:
  application:
    name: journalApp

  # Use MongoDB Atlas via a connection URI.
  # Replace the username/password and cluster host as needed.
  mongodb:
    uri: mongodb+srv://Debdatta:Deb_Atlas11@cluster0.9nhecdn.mongodb.net/journaldb?retryWrites=true&w=majority

  data:
    mongodb:
      # Only the URI is needed for Atlas. Do not use host/port/database separately when using URI.
      # host: localhost
      # port: 27017
      # database: journaldb
      auto-index-creation: true

      # The spring.data.mongodb.username and spring.data.mongodb.password properties are used to specify the username and password for authenticating with the MongoDB database.
